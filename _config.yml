title: Particle Fluid Simulation
description: >-
  WebGPU real-time particle fluid simulation with compute shaders and trail effects
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/particle-fluid-sim
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /particle-fluid-sim
lang: en
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude irrelevant files from Jekyll build
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - node_modules
  - src
  - dist
  - coverage
  - package.json
  - package-lock.json
  - tsconfig.json
  - vite.config.ts
  - vitest.config.ts
  - eslint.config.js
  - index.html
  - .prettierrc
  - .prettierignore
  - .editorconfig
  - .gitignore
  - .gitattributes
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.log"
