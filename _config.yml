title: Particle Fluid Simulation
description: WebGPU real-time particle fluid simulation with compute shaders and trail effects
url: "https://lessup.github.io"
baseurl: "/particle-fluid-sim"
lang: en

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

exclude:
  - node_modules
  - src
  - dist
  - coverage
  - package.json
  - package-lock.json
  - tsconfig.json
  - vite.config.ts
  - vitest.config.ts
  - eslint.config.js
  - index.html
  - .prettierrc
  - .prettierignore
  - .editorconfig
  - .vscode
  - .kiro
  - "*.log"
